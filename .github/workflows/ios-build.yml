name: iOS Build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        run: npm install
      - name: Prepare www
        run: |
          mkdir -p www
          echo '<html><body></body></html>' > www/index.html
      - name: Web assets kopyala
        run: |
          mkdir -p ios/App/App/public
          cp -r www/* ios/App/App/public/
          cp capacitor.config.json ios/App/App/capacitor.config.json 2>/dev/null || true
      - name: Restore Podfile
        run: |
          cat > ios/App/Podfile << 'PODEOF'
require_relative '../../node_modules/@capacitor/ios/scripts/pods_helpers'

platform :ios, '13.0'
use_frameworks!

target 'App' do
  capacitor_pods
end

post_install do |installer|
  assertDeploymentTarget(installer)
  installer.pods_project.targets.each do |target|
    target.build_configurations.each do |config|
      config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
      config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
      config.build_settings['CODE_SIGN_IDENTITY'] = ''
    end
  end
end
PODEOF
      - name: CocoaPods
        run: |
          cd ios/App
          pod install
      - name: Setup certificates
        env:
          CERT_B64: ''
          KEY_B64: ''
          PROV_B64: ''
        run: |
          echo "$CERT_B64" | base64 --decode > dist.cer
          echo "$KEY_B64" | base64 --decode > dist.key
          echo "$PROV_B64" | base64 --decode > app.mobileprovision
          openssl pkcs12 -export -out dist.p12 -inkey dist.key \
            -in <(openssl x509 -inform DER -in dist.cer) -passout pass:build123
          security create-keychain -p build123 ios.keychain
          security default-keychain -s ios.keychain
          security unlock-keychain -p build123 ios.keychain
          security import dist.p12 -k ios.keychain -P build123 -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k build123 ios.keychain
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp app.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/"
          PNAME=$(security cms -D -i app.mobileprovision | grep -A1 '<key>Name</key>' | grep string | sed 's/.*<string>//;s/<\/string>//')
          echo "PNAME=$PNAME" >> $GITHUB_ENV
      - name: Archive
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PNAME" \
            DEVELOPMENT_TEAM="V38L48RNWG"
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $PWD/build
      - name: Upload to App Store
        env:
          ASC_KEY_B64: ''
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_B64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_Q5N5KJ7PC8.p8
          xcrun altool --upload-app \
            -f build/App.ipa -t ios \
            --apiKey "Q5N5KJ7PC8" \
            --apiIssuer "0e67f23f-3c6f-4017-be70-b0a9fd3a6c52"
