name: iOS Build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        run: npm install
      - name: Prepare www
        run: |
          mkdir -p www
          echo '<html><body></body></html>' > www/index.html
      - name: Capacitor setup
        run: |
          chmod -R 777 node_modules/.bin/
          npx cap add ios || true
          npx cap sync ios
      - name: CocoaPods
        run: |
          cd ios/App
          pod install
      - name: Setup certificates
        env:
          CERT_B64: ""
          KEY_B64: ""
          PROV_B64: ""
        run: |
          echo "" | base64 --decode > dist.cer
          echo "" | base64 --decode > dist.key
          echo "" | base64 --decode > app.mobileprovision
          openssl pkcs12 -export -out dist.p12 -inkey dist.key \
            -in <(openssl x509 -inform DER -in dist.cer) -passout pass:build123
          security create-keychain -p build123 ios.keychain
          security default-keychain -s ios.keychain
          security unlock-keychain -p build123 ios.keychain
          security import dist.p12 -k ios.keychain -P build123 -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k build123 ios.keychain
          mkdir -p "/Library/MobileDevice/Provisioning Profiles"
          cp app.mobileprovision "/Library/MobileDevice/Provisioning Profiles/"
          PNAME=$(security cms -D -i app.mobileprovision | grep -A1 '<key>Name</key>' | grep string | sed 's/.*<string>//;s/<\/string>//')
          echo "PNAME=" >> 
      - name: Archive
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath /build/App.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM=""
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath /build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath /build
      - name: Upload to App Store
        env:
          ASC_KEY_B64: ""
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_.p8
          xcrun altool --upload-app \
            -f build/App.ipa -t ios \
            --apiKey "" \
            --apiIssuer ""