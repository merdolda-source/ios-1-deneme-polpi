name: iOS Build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        run: npm install
      - name: Prepare www
        run: |
          mkdir -p www
          echo '<html><body></body></html>' > www/index.html
      - name: Capacitor setup
        run: |
          chmod -R 777 node_modules/.bin/
          npx cap add ios || true
          npx cap sync ios
      - name: Setup certificates
        env:
          CERT_B64: ""
          KEY_B64: ""
          PROV_B64: ""
        run: |
          echo "$CERT_B64" | base64 --decode > dist.cer
          echo "$KEY_B64" | base64 --decode > dist.key
          echo "$PROV_B64" | base64 --decode > app.mobileprovision
          openssl pkcs12 -export -out dist.p12 -inkey dist.key \
            -in <(openssl x509 -inform DER -in dist.cer) -passout pass:build123
          security create-keychain -p build123 ios.keychain
          security default-keychain -s ios.keychain
          security unlock-keychain -p build123 ios.keychain
          security import dist.p12 -k ios.keychain -P build123 -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k build123 ios.keychain
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp app.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/"
          PNAME=$(security cms -D -i app.mobileprovision | grep -A1 '<key>Name</key>' | grep string | sed 's/.*<string>//;s/<\/string>//')
          echo "PNAME=$PNAME" >> $GITHUB_ENV
      - name: Archive
        run: |
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PNAME" \
            DEVELOPMENT_TEAM="V38L48RNWG"
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $PWD/build
      - name: Upload to App Store
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          cat > ~/.appstoreconnect/private_keys/AuthKey_Q5N5KJ7PC8.p8 << 'P8KEYEOF'

P8KEYEOF
          xcrun altool --upload-app \
            -f build/App.ipa -t ios \
            --apiKey "Q5N5KJ7PC8" \
            --apiIssuer "0e67f23f-3c6f-4017-be70-b0a9fd3a6c52"
